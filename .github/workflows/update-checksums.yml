# After a PR is merged, sync the repo-wide MD5 index with annotations.tsv:
# prune removed rows and append checksums for new rows.
name: Update annotation checksum index

on:
  push:
    branches: [master, main]
    paths:
      - "**/annotations.tsv"
      - "checksums/**"
      - "scripts/update_checksum_index.py"
      - "scripts/registry_checksums.py"
      - "scripts/validate_pr.py"

permissions:
  contents: write

jobs:
  update-checksums:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/guigolab/annotrieve-registry/registry-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Trust workspace for Git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Sync checksum index
        env:
          BASE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          python scripts/update_checksum_index.py \
            --base "${BASE_SHA}" \
            --head "${HEAD_SHA}"

      - name: Commit and push index updates
        run: |
          if git diff --quiet -- checksums/annotation_checksums.tsv; then
            echo "Checksum index unchanged."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add checksums/annotation_checksums.tsv
          git commit -m "chore: sync annotation checksum index"
          git push
