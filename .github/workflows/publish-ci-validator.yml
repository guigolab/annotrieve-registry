# Build and push the CI validator image used by validate-pr.yml (GHCR).
name: Publish CI validator image

on:
  workflow_dispatch:
    inputs:
      datasets_release:
        description: "NCBI datasets GitHub release tag (e.g. v18.26.0)"
        required: false
        default: "v18.26.0"
      reviewdog_semver:
        description: "reviewdog semver without v prefix (e.g. 0.20.3)"
        required: false
        default: "0.20.3"
  push:
    branches:
      - master
    paths:
      - "docker/ci-validator/**"
      - "requirements.txt"
      - ".github/workflows/publish-ci-validator.yml"

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: registry-ci

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve build arguments
        id: args
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "datasets=${{ inputs.datasets_release }}" >> "$GITHUB_OUTPUT"
            echo "reviewdog=${{ inputs.reviewdog_semver }}" >> "$GITHUB_OUTPUT"
          else
            echo "datasets=v18.26.0" >> "$GITHUB_OUTPUT"
            echo "reviewdog=0.20.3" >> "$GITHUB_OUTPUT"
          fi

      - name: Lowercase image name (GHCR)
        id: ghcr
        run: |
          repo_lower=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${repo_lower}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "Building ${repo_lower}/${IMAGE_NAME}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/ci-validator/Dockerfile
          push: true
          tags: |
            ${{ steps.ghcr.outputs.image }}:latest
            ${{ steps.ghcr.outputs.image }}:git-${{ github.sha }}
          build-args: |
            DATASETS_RELEASE=${{ steps.args.outputs.datasets }}
            REVIEWDOG_SEMVER=${{ steps.args.outputs.reviewdog }}
