name: Validate registry PR

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tabix curl

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run validation script
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set +e
          python scripts/validate_pr.py \
            --base "${BASE_SHA}" \
            --head "${HEAD_SHA}" \
            --output-summary validation-summary.md \
            --output-inline-json validation-inline.json
          ec=$?
          if [ ! -f validation-summary.md ]; then
            printf '%s\n\n### Validator error\n\nThe validation script exited before writing a summary.\n' '<!-- annotrieve-registry-validation -->' > validation-summary.md
          fi
          if [ ! -f validation-inline.json ]; then
            echo '[]' > validation-inline.json
          fi
          echo "$ec" > validate.exitcode

      - name: Post inline review comments
        if: always()
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        with:
          script: |
            const fs = require('fs');
            const pr = Number(process.env.PR_NUMBER);
            const headSha = process.env.HEAD_SHA;
            let comments = [];
            try {
              comments = JSON.parse(fs.readFileSync('validation-inline.json', 'utf8'));
            } catch (e) {
              comments = [];
            }
            if (!Array.isArray(comments) || comments.length === 0) {
              console.log('No inline review comments to post.');
              return;
            }
            const payload = comments
              .filter((c) => c.path && c.line && c.body)
              .map((c) => ({
                path: c.path,
                line: Number(c.line),
                side: 'RIGHT',
                body: c.body,
              }));
            if (payload.length === 0) return;
            try {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr,
                commit_id: headSha,
                event: 'COMMENT',
                comments: payload,
              });
            } catch (e) {
              console.error('createReview failed (inline comments):', e.message || e);
            }

      - name: Post or update PR summary comment
        if: always()
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          script: |
            const fs = require('fs');
            const issue_number = Number(process.env.PR_NUMBER);
            const body = fs.readFileSync('validation-summary.md', 'utf8');
            const marker = '<!-- annotrieve-registry-validation -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((c) => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              });
            }

      - name: Enforce validation result
        run: exit $(cat validate.exitcode)
