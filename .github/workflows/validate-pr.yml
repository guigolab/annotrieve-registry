name: Validate registry PR

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tabix curl

      - name: Install NCBI datasets CLI
        run: |
          curl -fsSL -o datasets \
            'https://ftp.ncbi.nlm.nih.gov/pub/datasets/command-line/LATEST/linux-amd64/datasets'
          chmod +x datasets
          sudo mv datasets /usr/local/bin/
          datasets --version

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run validation script
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set +e
          python scripts/validate_pr.py \
            --base "${BASE_SHA}" \
            --head "${HEAD_SHA}" \
            --output validation-report.md
          ec=$?
          if [ ! -f validation-report.md ]; then
            printf '%s\n\n### Validator error\n\nThe validation script exited before writing a report.\n' '<!-- annotrieve-registry-validation -->' > validation-report.md
          fi
          echo "$ec" > validate.exitcode

      - name: Post or update PR comment
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          script: |
            const fs = require('fs');
            const issue_number = Number(process.env.PR_NUMBER);
            const body = fs.readFileSync('validation-report.md', 'utf8');
            const marker = '<!-- annotrieve-registry-validation -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((c) => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              });
            }

      - name: Enforce validation result
        run: exit $(cat validate.exitcode)
