name: Validate registry PR

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths:
      - "**/*.yaml"
      - "**/*.tsv"
      - "!sample_project/**"

permissions:
  contents: read
  pull-requests: write
  checks: write
  issues: write
  packages: read

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    # Must match publish-ci-validator.yml (lowercase). Edit if org/repo or tag changes.
    container:
      image: ghcr.io/emiliorighi/annotrieve-registry/registry-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Container mounts the workspace from the host; Git 2.35+ treats different
      # ownership as "dubious" unless the directory is explicitly trusted.
      - name: Trust workspace for Git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      # Fetch the fork's commits so HEAD_SHA is resolvable by git.
      # pull_request_target checks out the base branch by default; the fork's
      # commits are not present until we fetch refs/pull/N/head explicitly.
      - name: Fetch PR head commits
        run: git fetch origin pull/${{ github.event.pull_request.number }}/head

      - name: Check changed TSV files
        id: tsv_check
        run: |
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          MERGE_BASE=$(git merge-base "$BASE_SHA" "$HEAD_SHA")
          # wc -l pads with spaces; strip so numeric tests are reliable
          CHANGED_TSVS=$(git diff --name-only "$MERGE_BASE" "$HEAD_SHA" | grep 'annotations\.tsv' | wc -l | tr -d '[:space:]')
          echo "tsv_count=${CHANGED_TSVS}" >> "$GITHUB_OUTPUT"
          if [ "$CHANGED_TSVS" -eq 0 ]; then
            echo "No annotations.tsv files changed — skipping validation."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          elif [ "$CHANGED_TSVS" -gt 1 ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "::error::${CHANGED_TSVS} annotations.tsv files changed. Please limit each PR to a single TSV file."
            exit 1
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run validation script
        if: steps.tsv_check.outputs.skip != 'true'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          # Optional: set NCBI_API_KEY secret to raise NCBI rate limit (3 → 10 req/s)
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
          # Tuning knobs (uncomment and adjust if needed):
          # VALIDATE_DATASETS_BATCH_SIZE: "2000"
          # VALIDATE_URL_HEAD_WORKERS: "4"
          # VALIDATE_DOWNLOAD_WORKERS: "3"
          # VALIDATE_MAX_DOWNLOAD_BYTES: "524288000"
          # VALIDATE_SCAN_BYTES: "52428800"
        run: |
          # Default bash is -eo pipefail; use "|| ec=$?" so a failing Python exit does not abort the step before we write outputs.
          ec=0
          python scripts/validate_pr.py \
            --base "${BASE_SHA}" \
            --head "${HEAD_SHA}" \
            --output-summary validation-summary.md \
            --output-rdjsonl validation.rdjsonl \
            || ec=$?
          if [ ! -f validation-summary.md ]; then
            printf '%s\n\n### Validator error\n\nThe validation script exited before writing a summary.\n' \
              '<!-- annotrieve-registry-validation -->' > validation-summary.md
          fi
          if [ ! -f validation.rdjsonl ]; then
            : > validation.rdjsonl
          fi
          echo "=== Validation result (exit code: ${ec}) ==="
          cat validation-summary.md
          cat validation-summary.md >> "$GITHUB_STEP_SUMMARY"
          echo "$ec" > validate.exitcode

      # Post the PR summary before reviewdog so a reviewdog/API glitch never blocks the sticky summary.
      - name: Post or update PR summary comment
        if: always() && steps.tsv_check.outputs.skip != 'true'
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const ws = process.env.GITHUB_WORKSPACE || '.';
            const issue_number = Number(process.env.PR_NUMBER);
            core.info(`Posting summary comment to PR #${issue_number}`);
            let body;
            try {
              body = fs.readFileSync(`${ws}/validation-summary.md`, 'utf8');
            } catch (e) {
              core.warning(`Could not read validation-summary.md: ${e.message}`);
              return;
            }
            const marker = '<!-- annotrieve-registry-validation -->';
            try {
              const all = [];
              for (let page = 1; page <= 20; page++) {
                const { data } = await github.rest.issues.listComments({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number,
                  per_page: 100,
                  page,
                });
                all.push(...data);
                if (data.length < 100) break;
              }
              const existing = all.find((c) => c.body && c.body.includes(marker));
              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body,
                });
                core.info(`Updated existing comment #${existing.id}`);
              } else {
                const { data: created } = await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number,
                  body,
                });
                core.info(`Created new comment #${created.id}`);
              }
            } catch (e) {
              core.error(`Failed to post PR summary comment: ${e.message}`);
              if (e.response && e.response.data) {
                core.error(JSON.stringify(e.response.data));
              }
            }

      - name: Post inline annotations via reviewdog
        if: always() && steps.tsv_check.outputs.skip != 'true'
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ github.token }}
        run: |
          set +e
          reviewdog -f rdjsonl \
            -name "annotrieve-validator" \
            -reporter=github-pr-review \
            -filter-mode=added \
            -fail-on-error=false \
            < validation.rdjsonl
          rd=$?
          if [ "$rd" -ne 0 ]; then
            echo "::warning::reviewdog exited with $rd (inline annotations may be missing)"
          fi
          exit 0

      - name: Enforce validation result
        if: always() && steps.tsv_check.outputs.skip != 'true'
        run: |
          if [ -f validate.exitcode ]; then
            ec=$(tr -d '[:space:]' < validate.exitcode)
            if [ "$ec" = "0" ]; then
              echo "Validation passed."
            else
              echo "::notice::Validation reported failures (exit $ec). That is expected when rows or manifests fail checks — fix the issues in **Files changed** or inline review comments."
            fi
            exit "$ec"
          fi
