name: Validate registry PR

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  checks: write
  issues: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Fetch the fork's commits so HEAD_SHA is resolvable by git.
      # pull_request_target checks out the base branch by default; the fork's
      # commits are not present until we fetch refs/pull/N/head explicitly.
      - name: Fetch PR head commits
        run: git fetch origin pull/${{ github.event.pull_request.number }}/head

      - name: Check changed TSV files
        id: tsv_check
        run: |
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          MERGE_BASE=$(git merge-base "$BASE_SHA" "$HEAD_SHA")
          CHANGED_TSVS=$(git diff --name-only "$MERGE_BASE" "$HEAD_SHA" | grep 'annotations\.tsv' | wc -l)
          echo "tsv_count=${CHANGED_TSVS}" >> "$GITHUB_OUTPUT"
          if [ "$CHANGED_TSVS" -eq 0 ]; then
            echo "No annotations.tsv files changed — skipping validation."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          elif [ "$CHANGED_TSVS" -gt 1 ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "::error::${CHANGED_TSVS} annotations.tsv files changed. Please limit each PR to a single TSV file."
            exit 1
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.tsv_check.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        if: steps.tsv_check.outputs.skip != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y tabix

      - name: Install NCBI datasets CLI
        if: steps.tsv_check.outputs.skip != 'true'
        run: |
          curl -fsSL \
            'https://ftp.ncbi.nlm.nih.gov/pub/datasets/command-line/LATEST/linux-amd64/datasets' \
            -o /usr/local/bin/datasets
          chmod +x /usr/local/bin/datasets
          datasets --version

      - name: Install Python dependencies
        if: steps.tsv_check.outputs.skip != 'true'
        run: pip install -r requirements.txt

      - name: Run validation script
        if: steps.tsv_check.outputs.skip != 'true'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          # Optional: set NCBI_API_KEY secret to raise NCBI rate limit (3 → 10 req/s)
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
          # Tuning knobs (uncomment and adjust if needed):
          # VALIDATE_DATASETS_BATCH_SIZE: "2000"
          # VALIDATE_URL_HEAD_WORKERS: "4"
          # VALIDATE_DOWNLOAD_WORKERS: "3"
          # VALIDATE_MAX_DOWNLOAD_BYTES: "524288000"
          # VALIDATE_SCAN_BYTES: "52428800"
        run: |
          set +e
          python scripts/validate_pr.py \
            --base "${BASE_SHA}" \
            --head "${HEAD_SHA}" \
            --output-summary validation-summary.md \
            --output-inline-json validation-inline.json
          ec=$?
          if [ ! -f validation-summary.md ]; then
            printf '%s\n\n### Validator error\n\nThe validation script exited before writing a summary.\n' \
              '<!-- annotrieve-registry-validation -->' > validation-summary.md
          fi
          if [ ! -f validation-inline.json ]; then
            echo '[]' > validation-inline.json
          fi
          echo "$ec" > validate.exitcode

      - name: Post inline review comments
        if: always() && steps.tsv_check.result == 'success' && steps.tsv_check.outputs.skip != 'true'
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        with:
          script: |
            const fs = require('fs');
            const pr = Number(process.env.PR_NUMBER);
            const headSha = process.env.HEAD_SHA;
            let comments = [];
            try {
              comments = JSON.parse(fs.readFileSync('validation-inline.json', 'utf8'));
            } catch (e) {
              comments = [];
            }
            if (!Array.isArray(comments) || comments.length === 0) {
              console.log('No inline review comments to post.');
              return;
            }
            const payload = comments
              .filter((c) => c.path && c.line && c.body)
              .map((c) => ({ path: c.path, line: Number(c.line), side: 'RIGHT', body: c.body }));
            if (payload.length === 0) return;
            try {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr,
                commit_id: headSha,
                event: 'COMMENT',
                comments: payload,
              });
            } catch (e) {
              console.error('createReview failed:', e.message || e);
            }

      - name: Post or update PR summary comment
        if: always() && steps.tsv_check.result == 'success' && steps.tsv_check.outputs.skip != 'true'
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          script: |
            const fs = require('fs');
            const issue_number = Number(process.env.PR_NUMBER);
            const body = fs.readFileSync('validation-summary.md', 'utf8');
            const marker = '<!-- annotrieve-registry-validation -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((c) => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              });
            }

      - name: Enforce validation result
        if: steps.tsv_check.outputs.skip != 'true'
        run: exit $(cat validate.exitcode)
